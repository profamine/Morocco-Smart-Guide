name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout le code source
      uses: actions/checkout@v4

    - name: Configurer Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Configurer Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Installer les dépendances Node.js
      run: npm ci

    - name: Build de l'application Web (Vite)
      run: npm run build

    - name: Synchroniser le build web avec Capacitor
      run: npx cap sync android

    - name: Accorder les permissions d'exécution à Gradlew
      run: chmod +x android/gradlew

    - name: Build de l'APK Android (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Téléverser l'APK généré
      uses: actions/upload-artifact@v4
      with:
        name: morocco-smart-guide-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk