name: Build Android APK

on:
  push:
    branches: [ main ] # Déclenche le build à chaque push sur la branche main
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Version stable recommandée
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci # Utilise npm ci pour un build propre et reproductible en CI

    - name: Build Web Application
      run: npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu' # Distribution Java recommandée pour Android
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Capacitor Sync
      run: npx cap sync android

    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: morocco-smart-guide-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk