name: Android CI (Build APK)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout le code source
      uses: actions/checkout@v4

    - name: Configurer Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Accorder les permissions d'exécution à Gradlew
      run: chmod +x gradlew

    - name: Build de l'APK (Debug)
      run: ./gradlew assembleDebug

    - name: Téléverser l'APK généré
      uses: actions/upload-artifact@v4
      with:
        name: morocco-smart-guide-apk
        path: app/build/outputs/apk/debug/app-debug.apk